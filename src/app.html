<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Pécule</title>
    <script>
      // Applique le thème avant le premier rendu pour éviter tout flash.
      // Sombre par défaut (cf. :root). « light » uniquement si choisi.
      try {
        var t = localStorage.getItem("pecule:theme");
        if (t === "light") document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
      try {
        // Marque macOS : la barre de titre Overlay (feux natifs) n'existe que là,
        // d'où un padding gauche réservé uniquement sur cette plateforme.
        var plat =
          (navigator.userAgentData && navigator.userAgentData.platform) ||
          navigator.platform ||
          navigator.userAgent;
        if (/mac/i.test(plat)) document.documentElement.classList.add("is-macos");
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
